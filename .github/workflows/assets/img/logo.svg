<svg width="100%" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background card -->
  <rect x="60" y="30" width="560" height="260" rx="20" fill="#0C3F6E" stroke="#1A5FA8" stroke-width="1" style="fill:rgb(12, 63, 110);stroke:rgb(26, 95, 168);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Subtle inner border accent -->
  <rect x="72" y="42" width="536" height="236" rx="14" fill="none" stroke="#1A5FA8" stroke-width="0.8" opacity="0.5" style="fill:none;stroke:rgb(26, 95, 168);color:rgb(0, 0, 0);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Tooth Icon (left) -->
  <!-- Tooth body: two roots + crown -->
  <g transform="translate(148, 160)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <!-- Crown of tooth -->
    <path d="M-38,-62 C-44,-62 -50,-54 -50,-44 C-50,-30 -44,-18 -38,-8 L-28,0 L0,-10 L28,0 L38,-8 C44,-18 50,-30 50,-44 C50,-54 44,-62 38,-62 C30,-62 22,-56 14,-52 C8,-48 -8,-48 -14,-52 C-22,-56 -30,-62 -38,-62 Z" fill="#F5C842" stroke="#D4A510" stroke-width="1.5" style="fill:rgb(245, 200, 66);stroke:rgb(212, 165, 16);color:rgb(0, 0, 0);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- Subtle highlight on crown -->
    <path d="M-18,-54 C-14,-58 -4,-60 2,-56" fill="none" stroke="#FDEAA0" stroke-width="2" stroke-linecap="round" opacity="0.7" style="fill:none;stroke:rgb(253, 234, 160);color:rgb(0, 0, 0);stroke-width:2px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.7;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- Left root -->
    <path d="M-28,0 C-30,16 -28,32 -22,44 C-18,52 -12,58 -6,54 C-2,52 0,44 0,36" fill="#F5C842" stroke="#D4A510" stroke-width="1.2" style="fill:rgb(245, 200, 66);stroke:rgb(212, 165, 16);color:rgb(0, 0, 0);stroke-width:1.2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- Right root -->
    <path d="M28,0 C30,16 28,32 22,44 C18,52 12,58 6,54 C2,52 0,44 0,36" fill="#F5C842" stroke="#D4A510" stroke-width="1.2" style="fill:rgb(245, 200, 66);stroke:rgb(212, 165, 16);color:rgb(0, 0, 0);stroke-width:1.2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- Center line between roots -->
    <path d="M0,4 L0,36" fill="none" stroke="#D4A510" stroke-width="1" opacity="0.5" style="fill:none;stroke:rgb(212, 165, 16);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  </g>

  <!-- Small cross/plus medical icon -->
  <rect x="208" y="82" width="8" height="24" rx="2" fill="#F5C842" style="fill:rgb(245, 200, 66);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <rect x="202" y="88" width="20" height="8" rx="2" fill="#F5C842" style="fill:rgb(245, 200, 66);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Clinic Name -->
  <text x="248" y="130" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="700" fill="#F5C842" letter-spacing="1" style="fill:rgb(245, 200, 66);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, &quot;Times New Roman&quot;, serif;font-size:34px;font-weight:700;text-anchor:start;dominant-baseline:auto">Sushmita's</text>
  <text x="248" y="168" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="400" fill="#FFFFFF" letter-spacing="3" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, &quot;Times New Roman&quot;, serif;font-size:28px;font-weight:400;text-anchor:start;dominant-baseline:auto">DENTAL CLINIC</text>

  <!-- Divider line with dot accents -->
  <line x1="248" y1="185" x2="568" y2="185" stroke="#F5C842" stroke-width="1" opacity="0.5" style="fill:rgb(0, 0, 0);stroke:rgb(245, 200, 66);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="248" cy="185" r="3" fill="#F5C842" style="fill:rgb(245, 200, 66);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="568" cy="185" r="3" fill="#F5C842" style="fill:rgb(245, 200, 66);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Tagline -->
  <text x="408" y="210" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#A8CCEE" text-anchor="middle" letter-spacing="2.5" style="fill:rgb(168, 204, 238);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Arial, sans-serif;font-size:13px;font-weight:400;text-anchor:middle;dominant-baseline:auto">YOUR SMILE, OUR PASSION</text>

  <!-- Bottom accent: small smile arc -->
  <path d="M358,238 Q408,258 458,238" fill="none" stroke="#F5C842" stroke-width="2.5" stroke-linecap="round" opacity="0.7" style="fill:none;stroke:rgb(245, 200, 66);color:rgb(0, 0, 0);stroke-width:2.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.7;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="358" cy="238" r="3" fill="#F5C842" opacity="0.7" style="fill:rgb(245, 200, 66);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.7;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="458" cy="238" r="3" fill="#F5C842" opacity="0.7" style="fill:rgb(245, 200, 66);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.7;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
</svg>